services:

  philter:
    build: .
    ports:
      - "8443:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DATABASE=philter
      - MONGO_COLLECTION=contexts
      - MONGO_POLICY_COLLECTION=policies
      - PHILTER_AUTH_ENABLED=true
      - PHILTER_API_TOKEN=secret-token
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
